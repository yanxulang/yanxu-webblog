[包]
格式 = 2
名称 = "yanxu-webblog"
版本 = "0.2.1"
言序 = ">=1.1.5"
入口 = "src/主.yx"
说明 = "使用言枢与言标构建的完整博客参考项目"
许可 = "MIT"
作者 = ["言序团队"]

[依赖]
yanxu-web = { git = "https://github.com/yanxulang/yanxu-web.git", 修订 = "main", 版 = "^0.2" }
言据 = { git = "https://github.com/yanxulang/yanju.git", 修订 = "main", 版 = "^1" }

[权限]
文件 = ["."]
网络 = []
TCP监听 = ["127.0.0.1", "::1", "localhost"]
UDP绑定 = []
环境 = ["YANXU_WEBBLOG_ADDR"]
进程 = false
原生扩展 = false

[资源]
目录 = ["templates", "static"]

[导出]
默认 = "src/主.yx"

[构建]
目标 = "字节码"
