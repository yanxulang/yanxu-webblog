name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          path: .yanxu
          ref: e528542112b800989c9492492882e8adffc35c0c # yanxu 1.1.6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanbao
          path: .yanbao
          ref: 559585a2c5b0a9005884ac2b5651875d0d639f53 # yanbao 0.2.1
      - name: Build Yanxu 1.1.6
        run: cargo build --manifest-path .yanxu/Cargo.toml --locked --bin yanxu
      - name: Resolve, check and test
        run: |
          chmod +x .yanbao/yanbao
          YANXU_BIN="$GITHUB_WORKSPACE/.yanxu/target/debug/yanxu" .yanbao/yanbao install --manifest-path .
          .yanxu/target/debug/yanxu 查 src/主.yx
          .yanxu/target/debug/yanxu 试 tests --并发 1 --json
          YANXU_BIN="$GITHUB_WORKSPACE/.yanxu/target/debug/yanxu" .yanbao/yanbao build --manifest-path . --release
